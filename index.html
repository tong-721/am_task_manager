<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户经理任务管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .checkbox-wrapper { position: relative; }
        .custom-checkbox { 
            width: 20px; height: 20px; border: 2px solid #cbd5e1; 
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .custom-checkbox:hover { border-color: #3b82f6; }
        .custom-checkbox.checked { 
            background: #3b82f6; border-color: #3b82f6; 
        }
        .custom-checkbox.checked::after {
            content: '✓'; color: white; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12px; font-weight: bold;
        }
        .priority-p0 { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .priority-p1 { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .priority-p2 { background: #dbeafe; color: #2563eb; border: 1px solid #bfdbfe; }
        .progress-ring { transform: rotate(-90deg); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { color: #334155; }
        .upload-area { cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .login-card { animation: fadeIn 0.5s ease; }
        .hidden { display: none !important; }
        .sync-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sync-status { font-size: 11px; padding: 2px 8px; border-radius: 12px; }
        .sync-online { background: #dcfce7; color: #16a34a; }
        .sync-offline { background: #f3f4f6; color: #6b7280; }
        .sync-syncing { background: #dbeafe; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen">


    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="login-card bg-white rounded-2xl shadow-lg p-8 w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">AM</div>
                <h1 class="text-2xl font-bold text-gray-900">客户经理任务管理</h1>
                <p class="text-gray-500 mt-2">请选择您的身份</p>
            </div>
            <div id="am-buttons" class="space-y-3"></div>
            <div id="team-code-section" class="mt-6 pt-6 border-t border-gray-200">
                <label class="block text-sm font-medium text-gray-700 mb-2">团队同步码</label>
                <div class="flex gap-2">
                    <input type="text" id="team-code-input" value="team-tiger" placeholder="team-tiger" 
                        class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="connectTeam()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">连接</button>
                </div>
                <p id="team-code-display" class="mt-2 text-sm text-blue-600 font-medium hidden"></p>
                <p class="mt-1 text-xs text-gray-400">团队码：team-tiger（其他设备输入相同码即可同步）</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-white shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between flex-wrap gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">AM</div>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900">客户经理任务管理</h1>
                            <p class="text-sm text-gray-500">当前用户: <span id="current-user-name"></span></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="sync-status" class="sync-status sync-offline">未同步</span>
                        <button onclick="forceSync()" class="text-xs px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded text-gray-600">手动同步</button>
                        <div class="flex items-center gap-2">
                            <div class="w-12 h-12 relative">
                                <svg class="progress-ring w-12 h-12" viewBox="0 0 36 36">
                                    <circle cx="18" cy="18" r="16" fill="none" stroke="#e2e8f0" stroke-width="3"/>
                                    <circle id="progress-circle" cx="18" cy="18" r="16" fill="none" stroke="#3b82f6" stroke-width="3"
                                        stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round"/>
                                </svg>
                                <span id="progress-text" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-gray-700">0%</span>
                            </div>
                            <div class="text-sm">
                                <div class="text-gray-500">完成率</div>
                                <div id="stats-completed" class="font-semibold text-gray-900">0/0</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-blue-600" id="stats-pending">0</div>
                            <div class="text-xs text-gray-500">待办任务</div>
                        </div>
                        <button onclick="logout()" class="px-4 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">返回首页</button>


                        </div>
                        </div>
                        </div>
                        </header>


        <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex-1 min-w-[300px]">
                    <div class="upload-area flex items-center gap-2 px-4 py-2 bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg" onclick="document.getElementById('file-input').click()">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                        <span id="upload-text" class="text-sm text-gray-600">点击上传 Excel 文件</span>
                        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleFileUpload(this)">
                    </div>
                </div>
                <div class="w-32">
                    <select id="sort-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="changeSortMode(this.value)">
                        <option value="task">按任务分组</option>
                        <option value="seller">按卖家分组</option>
                    </select>
                </div>
                <div class="w-32">
                    <select id="priority-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="filterByPriority(this.value)">
                        <option value="">全部优先级</option>
                        <option value="P0">紧急</option>
                        <option value="P1">重要</option>
                        <option value="P2">普通</option>
                    </select>
                </div>
                <div class="w-40">
                    <input type="text" id="search-input" placeholder="搜索任务或卖家..." 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        oninput="filterBySearch(this.value)">
                </div>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="px-3 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">导出 Excel</button>
                    <button onclick="clearAllData()" class="px-3 py-2 text-sm bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition">清空</button>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm mb-6">
            <div class="flex border-b">
                <button id="tab-pending-btn" onclick="switchTab('pending')" class="tab-active px-6 py-3 font-medium text-sm flex items-center gap-2">
                    <span>待办任务</span>
                    <span id="badge-pending" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-xs">0</span>
                </button>
                <button id="tab-completed-btn" onclick="switchTab('completed')" class="tab-inactive px-6 py-3 font-medium text-sm flex items-center gap-2">
                    <span>已完成</span>
                    <span id="badge-completed" class="bg-green-100 text-green-600 px-2 py-0.5 rounded-full text-xs">0</span>
                </button>
            </div>
        </div>
        <div id="task-container" class="space-y-4"></div>
        <div id="empty-state" class="hidden text-center py-16">


            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mb-1">暂无任务</h3>
            <p class="text-gray-500">上传 Excel 文件开始使用</p>
            </div>
            </main>
            </div>


    <script>
        var tasks = [];
        var currentTab = 'pending';
        var currentAM = '';
        var currentPriority = '';
        var searchQuery = '';
        var sortMode = 'task';
        var teamCode = '';
        var binId = '';
        var apiKey = '$2a$10$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'; // JSONBin 免费公开 key
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
        function checkLoginStatus() {
            var savedAM = localStorage.getItem('current_am');
            var savedTeamCode = localStorage.getItem('team_code');
            if (savedTeamCode) {
                document.getElementById('team-code-input').value = savedTeamCode;
            }
            if (savedAM && savedTeamCode) {
                currentAM = savedAM;
                teamCode = savedTeamCode;
                binId = localStorage.getItem('bin_id') || '';
                showMainApp();
                autoSync();
            } else {
                showLoginPage();
            }
        }
        function showLoginPage() {
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            generateAMButtons();
        }
        function showMainApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('current-user-name').textContent = currentAM;
            render();
            startAutoSync();
        }
        async function connectTeam() {
            var inputCode = document.getElementById('team-code-input').value.trim();
            if (!inputCode) {
                alert('请输入团队码');
                return;
            }
            teamCode = inputCode;
            localStorage.setItem('team_code', teamCode);
            
            updateSyncStatus('syncing', '同步中...');
            
            try {
                await loadFromCloud();
                generateAMButtons();
                document.getElementById('team-code-display').textContent = '已连接：' + teamCode;
                document.getElementById('team-code-display').classList.remove('hidden');
                updateSyncStatus('online', '已同步');
            } catch (err) {
                console.error('Sync error:', err);
                updateSyncStatus('offline', '同步失败');
            }
        }
        async function loadFromCloud() {
            if (!teamCode) return;
            
            try {
                var response = await fetch('https://api.jsonbin.io/v3/b/6666666666666/latest', {
                    headers: { 'X-Master-Key': apiKey }
                });
                
                if (response.status === 404) {
                    binId = await createBin();
                    return;
                }
                
                var data = await response.json();
                if (data.record && data.record[teamCode]) {
                    tasks = data.record[teamCode].tasks || [];
                    saveToStorage();
                }
            } catch (err) {
                loadFromStorage();
            }
        }
        async function createBin() {
            var payload = {};
            payload[teamCode] = { tasks: tasks, updatedAt: Date.now() };
            
            var response = await fetch('https://api.jsonbin.io/v3/b', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': apiKey
                },
                body: JSON.stringify(payload)
            });
            
            var data = await response.json();
            binId = data.metadata.id;
            localStorage.setItem('bin_id', binId);
            return binId;
        }
        async function saveToCloud() {


        if (!teamCode) return;


        updateSyncStatus('syncing', '同步中...');
        
        try {
            var payload = {};
            payload[teamCode] = { tasks: tasks, updatedAt: Date.now() };
            
            await fetch('https://api.jsonbin.io/v3/b/' + (binId || '6666666666666'), {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': apiKey
                },
                body: JSON.stringify(payload)
            });
            
            updateSyncStatus('online', '已同步');
        } catch (err) {
            updateSyncStatus('offline', '同步失败');
        }
    }
    function updateSyncStatus(status, text) {
        var el = document.getElementById('sync-status');
        el.className = 'sync-status sync-' + status;
        el.textContent = text;
    }
    function startAutoSync() {
        setInterval(autoSync, 30000);
    }
    async function autoSync() {
        if (!teamCode) return;
        await saveToCloud();
        await loadFromCloud();
        render();
    }
    function forceSync() {
        autoSync();
    }
    function generateAMButtons() {
        var ams = [];
        var amSet = {};
        for (var i = 0; i < tasks.length; i++) {
            if (!amSet[tasks[i].am]) {
                amSet[tasks[i].am] = true;
                ams.push(tasks[i].am);
            }
        }
        ams.sort();
        var container = document.getElementById('am-buttons');
        
        if (ams.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-4">暂无数据，请先上传 Excel</p>';
        } else {
            var html = '';
            for (var i = 0; i < ams.length; i++) {
                html += '<button onclick="loginAs(\'' + ams[i] + '\')" class="w-full py-3 px-4 bg-white border-2 border-gray-200 text-gray-700 rounded-lg hover:border-blue-500 hover:text-blue-600 transition font-medium text-left flex items-center justify-between">';
                html += '<span>' + ams[i] + '</span>';
                html += '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
                html += '</button>';
            }
            container.innerHTML = html;
        }
    }
    function loginAs(am) {
        currentAM = am;
        localStorage.setItem('current_am', am);
        showMainApp();
    }
    function logout() {
        currentAM = '';
        localStorage.removeItem('current_am');
        showLoginPage();
    }
    function handleFileUpload(input) {
        var file = input.files[0];
        if (!file) return;
        document.getElementById('upload-text').textContent = '正在读取: ' + file.name;
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = new Uint8Array(e.target.result);
                var workbook = XLSX.read(data, { type: 'array' });
                var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                var jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                importTasksFromRows(jsonData);
                alert('导入成功！');
                document.getElementById('upload-text').textContent = '点击上传 Excel 文件';
                saveToCloud();
                render();
            } catch (err) {
                alert('导入失败：' + err.message);
                document.getElementById('upload-text').textContent = '点击上传 Excel 文件';
            }


            };
reader.readAsArrayBuffer(file);
}


        function importTasksFromRows(rows) {
        var now = Date.now();
        var existingKeys = {};
        
        for (var i = 0; i < tasks.length; i++) {
            var key = tasks[i].seller + '|' + tasks[i].am + '|' + tasks[i].taskName;
            existingKeys[key] = true;
        }
        
        for (var i = 1; i < rows.length; i++) {
            var row = rows[i];
            if (!row || row.length < 3) continue;
            
            var seller = String(row[0] || '').trim();
            var am = String(row[1] || '').trim();
            var taskName = String(row[2] || '').trim();
            
            if (seller && am && taskName) {
                var key = seller + '|' + am + '|' + taskName;
                if (!existingKeys[key]) {
                    tasks.push({
                        id: 'task_' + now + '_' + i,
                        seller: seller,
                        am: am,
                        taskName: taskName,
                        priority: 'P2',
                        completed: false,
                        completedAt: null,
                        createdAt: now,
                        note: ''
                    });
                    existingKeys[key] = true;
                }
            }
        }
        
        saveToStorage();
    }
    function changeSortMode(mode) {
        sortMode = mode;
        render();
    }
    function filterByPriority(priority) {
        currentPriority = priority;
        render();
    }
    function filterBySearch(query) {
        searchQuery = query.toLowerCase();
        render();
    }
    function toggleTask(id) {
        for (var i = 0; i < tasks.length; i++) {
            if (tasks[i].id === id) {
                tasks[i].completed = !tasks[i].completed;
                tasks[i].completedAt = tasks[i].completed ? Date.now() : null;
                break;
            }
        }
        saveToStorage();
        saveToCloud();
        render();
    }
    function updatePriority(id, priority) {
        for (var i = 0; i < tasks.length; i++) {
            if (tasks[i].id === id) {
                tasks[i].priority = priority;
                break;
            }
        }
        saveToStorage();
        saveToCloud();
        render();
    }
    function updateNote(id, note) {
        for (var i = 0; i < tasks.length; i++) {
            if (tasks[i].id === id) {
                tasks[i].note = note;
                break;
            }
        }
        saveToStorage();
        saveToCloud();
    }
    function switchTab(tab) {
        currentTab = tab;
        
        var pendingBtn = document.getElementById('tab-pending-btn');
        var completedBtn = document.getElementById('tab-completed-btn');
        
        if (tab === 'pending') {
            pendingBtn.className = 'tab-active px-6 py-3 font-medium text-sm flex items-center gap-2';
            completedBtn.className = 'tab-inactive px-6 py-3 font-medium text-sm flex items-center gap-2';
        } else {
            pendingBtn.className = 'tab-inactive px-6 py-3 font-medium text-sm flex items-center gap-2';
            completedBtn.className = 'tab-active px-6 py-3 font-medium text-sm flex items-center gap-2';
        }
        
        render();
    }
    function render() {
        updateStats();
        
        var filtered = [];
        for (var i = 0; i < tasks.length; i++) {
            var t = tasks[i];
            if (t.am !== currentAM) continue;


        if (currentPriority && t.priority !== currentPriority) continue;
        if (searchQuery && t.seller.toLowerCase().indexOf(searchQuery) === -1 && t.taskName.toLowerCase().indexOf(searchQuery) === -1) continue;
        if (currentTab === 'pending' && t.completed) continue;
        if (currentTab === 'completed' && !t.completed) continue;
        filtered.push(t);
        }


        var container = document.getElementById('task-container');
        var emptyState = document.getElementById('empty-state');
        if (filtered.length === 0) {
            container.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }
        emptyState.classList.add('hidden');
        var html = '';
        var grouped = {};
        
        if (sortMode === 'task') {
            for (var i = 0; i < filtered.length; i++) {
                var t = filtered[i];
                var key = t.taskName;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(t);
            }
        } else {
            for (var i = 0; i < filtered.length; i++) {
                var t = filtered[i];
                var key = t.seller;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(t);
            }
        }
        for (var key in grouped) {
            var groupTasks = grouped[key];
            var allTasksInGroup = [];
            
            if (sortMode === 'task') {
                for (var i = 0; i < tasks.length; i++) {
                    if (tasks[i].am === currentAM && tasks[i].taskName === key) {
                        allTasksInGroup.push(tasks[i]);
                    }
                }
            } else {
                for (var i = 0; i < tasks.length; i++) {
                    if (tasks[i].am === currentAM && tasks[i].seller === key) {
                        allTasksInGroup.push(tasks[i]);
                    }
                }
            }
            
            var completedCount = 0;
            var p0Count = 0;
            
            for (var i = 0; i < allTasksInGroup.length; i++) {
                if (allTasksInGroup[i].completed) completedCount++;
                if (allTasksInGroup[i].priority === 'P0') p0Count++;
            }
            
            var progress = Math.round((completedCount / allTasksInGroup.length) * 100);
            
            html += '<div class="bg-white rounded-xl shadow-sm p-5 task-card fade-in">';
            html += '<div class="flex items-center justify-between mb-4">';
            html += '<div class="flex items-center gap-3">';
            html += '<h3 class="text-lg font-semibold text-gray-900">' + key + '</h3>';
            if (p0Count > 0) {
                html += '<span class="px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">' + p0Count + ' 紧急</span>';
            }
            html += '</div>';
            html += '<div class="flex items-center gap-2">';
            html += '<span class="text-sm text-gray-500 font-medium">' + completedCount + '/' + allTasksInGroup.length + '</span>';
            html += '<div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">';
            html += '<div class="h-full bg-blue-500 rounded-full transition-all" style="width: ' + progress + '%"></div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="space-y-2">';
            
            for (var i = 0; i < groupTasks.length; i++) {
                var t = groupTasks[i];


            html += '<div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">';
html += '<div class="checkbox-wrapper" onclick="toggleTask(\'' + t.id + '\')">';
html += '<div class="custom-checkbox ' + (t.completed ? 'checked' : '') + '"></div>';
html += '</div>';
if (sortMode === 'task') {
html += '<div class="w-24 font-medium text-gray-900">' + t.seller + '</div>';
} else {
html += '<div class="w-32 font-medium text-gray-900">' + t.taskName + '</div>';
}
html += '<input type="text" value="' + t.note + '" placeholder="添加备注..." ';
html += 'onchange="updateNote(\'' + t.id + '\', this.value)" ';
html += 'class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded focus:outline-none focus:border-blue-400"' + (currentTab === 'completed' ? ' disabled' : '') + '>';
if (currentTab === 'pending') {
html += '<select onchange="updatePriority(\'' + t.id + '\', this.value)" class="w-16 text-xs px-2 py-2 rounded priority-' + t.priority.toLowerCase() + ' focus:outline-none cursor-pointer">';
html += '<option value="P0" ' + (t.priority === 'P0' ? 'selected' : '') + '>紧急</option>';
html += '<option value="P1" ' + (t.priority === 'P1' ? 'selected' : '') + '>重要</option>';
html += '<option value="P2" ' + (t.priority === 'P2' ? 'selected' : '') + '>普通</option>';
html += '</select>';
} else {
var priorityText = t.priority === 'P0' ? '紧急' : (t.priority === 'P1' ? '重要' : '普通');
html += '<span class="w-16 text-xs px-2 py-1 rounded text-center priority-' + t.priority.toLowerCase() + '">' + priorityText + '</span>';
}
html += '</div>';
}


        html += '</div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }
    function updateStats() {
        var amTasks = [];
        for (var i = 0; i < tasks.length; i++) {
            if (tasks[i].am === currentAM) amTasks.push(tasks[i]);
        }
        
        var total = amTasks.length;
        var completed = 0;
        for (var i = 0; i < amTasks.length; i++) {
            if (amTasks[i].completed) completed++;
        }
        var pending = total - completed;
        var rate = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('stats-pending').textContent = pending;
        document.getElementById('stats-completed').textContent = completed + '/' + total;
        document.getElementById('progress-text').textContent = rate + '%';
        document.getElementById('progress-circle').style.strokeDashoffset = 100 - rate;
        
        document.getElementById('badge-pending').textContent = pending;
        document.getElementById('badge-completed').textContent = completed;
    }
    function exportData() {
        var amTasks = [];
        for (var i = 0; i < tasks.length; i++) {
            if (tasks[i].am === currentAM) amTasks.push(tasks[i]);
        }
        
        if (amTasks.length === 0) {
            alert('没有数据可导出');
            return;
        }
        var data = [];
        for (var i = 0; i < amTasks.length; i++) {
            var t = amTasks[i];


        data.push({
        '卖家': t.seller,
        'AM': t.am,
        '任务': t.taskName,
        '优先级': t.priority === 'P0' ? '紧急' : (t.priority === 'P1' ? '重要' : '普通'),
        '完成状态': t.completed ? '已完成' : '待办',
        '完成时间': t.completedAt ? new Date(t.completedAt).toLocaleString('zh-CN') : '-',
        '备注': t.note
        });
        }


        var ws = XLSX.utils.json_to_sheet(data);
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '任务列表');
        XLSX.writeFile(wb, 'AM任务列表_' + currentAM + '_' + new Date().toLocaleDateString('zh-CN') + '.xlsx');
    }
    function clearAllData() {
        if (confirm('确定要清空 ' + currentAM + ' 的所有数据吗？此操作不可恢复。')) {
            var newTasks = [];
            for (var i = 0; i < tasks.length; i++) {
                if (tasks[i].am !== currentAM) newTasks.push(tasks[i]);
            }
            tasks = newTasks;
            saveToStorage();
            saveToCloud();
            render();
        }
    }
    function saveToStorage() {
        localStorage.setItem('am_tasks', JSON.stringify(tasks));
    }
    function loadFromStorage() {
        var stored = localStorage.getItem('am_tasks');
        if (stored) {
            tasks = JSON.parse(stored);
        }
    }
</script>
