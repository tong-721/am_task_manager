<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户经理任务管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .checkbox-wrapper { position: relative; }
        .custom-checkbox { 
            width: 20px; height: 20px; border: 2px solid #cbd5e1; 
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        .custom-checkbox:hover { border-color: #3b82f6; }
        .custom-checkbox.checked { 
            background: #3b82f6; border-color: #3b82f6; 
        }
        .custom-checkbox.checked::after {
            content: '✓'; color: white; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12px; font-weight: bold;
        }
        .priority-p0 { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .priority-p1 { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .priority-p2 { background: #dbeafe; color: #2563eb; border: 1px solid #bfdbfe; }
        .progress-ring { transform: rotate(-90deg); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { color: #334155; }
    </style>
</head>
<body class="min-h-screen">


    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">AM</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">客户经理任务管理</h1>
                        <p class="text-sm text-gray-500">Account Manager Task System</p>
                    </div>
                </div>
                
                <!-- Stats -->
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <div class="w-12 h-12 relative">
                            <svg class="progress-ring w-12 h-12" viewBox="0 0 36 36">
                                <circle cx="18" cy="18" r="16" fill="none" stroke="#e2e8f0" stroke-width="3"/>
                                <circle id="progress-circle" cx="18" cy="18" r="16" fill="none" stroke="#3b82f6" stroke-width="3"
                                    stroke-dasharray="100" stroke-dashoffset="0" stroke-linecap="round"/>
                            </svg>
                            <span id="progress-text" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-gray-700">0%</span>
                        </div>
                        <div class="text-sm">
                            <div class="text-gray-500">完成率</div>
                            <div id="stats-completed" class="font-semibold text-gray-900">0/0</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-bold text-blue-600" id="stats-pending">0</div>
                        <div class="text-xs text-gray-500">待办任务</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Control Panel -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <div class="flex flex-wrap items-center gap-4">
                <!-- File Upload -->
                <div class="flex-1 min-w-[300px]">
                    <label class="flex items-center gap-2 px-4 py-2 bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                        <span class="text-sm text-gray-600">上传 Excel 文件</span>
                        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" class="hidden">
                    </label>
                </div>

                <!-- AM Filter -->
                <div class="w-48">
                    <select id="am-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">全部 AM</option>
                    </select>
                </div>

                <!-- Priority Filter -->
                <div class="w-40">
                    <select id="priority-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">全部优先级</option>  


            <option value="P0">P0 - 紧急</option>
            <option value="P1">P1 - 重要</option>
            <option value="P2">P2 - 普通</option>
            </select>
            </div>

            <!-- Search -->
            <div class="w-48">
                <input type="text" id="search-input" placeholder="搜索任务或卖家..." 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <!-- Actions -->
            <div class="flex gap-2">
                <button onclick="loadDemoData()" class="px-3 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
                    加载示例
                </button>
                <button onclick="exportData()" class="px-3 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    导出 Excel
                </button>
                <button onclick="clearAllData()" class="px-3 py-2 text-sm bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition">
                    清空
                </button>
            </div>
        </div>
    </div>
    <!-- Tabs -->
    <div class="bg-white rounded-xl shadow-sm mb-6">
        <div class="flex border-b">
            <button onclick="switchTab('pending')" id="tab-pending" class="tab-active px-6 py-3 font-medium text-sm flex items-center gap-2">
                <span>待办任务</span>
                <span id="badge-pending" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-xs">0</span>
            </button>
            <button onclick="switchTab('completed')" id="tab-completed" class="tab-inactive px-6 py-3 font-medium text-sm flex items-center gap-2">
                <span>已完成</span>
                <span id="badge-completed" class="bg-green-100 text-green-600 px-2 py-0.5 rounded-full text-xs">0</span>
            </button>
        </div>
    </div>
    <!-- Task List -->
    <div id="task-container" class="space-y-4">
        <!-- Tasks will be rendered here -->
    </div>
    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">暂无任务</h3>
        <p class="text-gray-500">上传 Excel 文件或加载示例数据开始使用</p>
    </div>
</main>


      <script>
        // Data Store
        let tasks = [];
        let currentTab = 'pending';
        let currentAM = '';
        let currentPriority = '';
        let searchQuery = '';
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            setupEventListeners();
            render();
        });
        function setupEventListeners() {
            document.getElementById('file-input').addEventListener('change', handleFileUpload);
            document.getElementById('am-filter').addEventListener('change', (e) => {
                currentAM = e.target.value;
                render();
            });
            document.getElementById('priority-filter').addEventListener('change', (e) => {
                currentPriority = e.target.value;
                render();
            });
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                render();
            });
        }
        // File Upload
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    importTasks(jsonData);
                    alert('导入成功！共 ' + jsonData.length + ' 条记录');
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
        // Import Tasks from Excel
        function importTasks(data) {
            const now = Date.now();
            data.forEach((row, index) => {
                const seller = row['卖家'] || row['卖家（客户）名称'] || row['seller'] || row['客户'] || Object.values(row)[0];
                const am = row['AM'] || row['客户经理'] || row['am'] || Object.values(row)[1];
                const taskName = row['task'] || row['任务'] || row['Task'] || Object.values(row)[2];
                
                if (seller && am && taskName) {
                    tasks.push({
                        id: 'task_' + now + '_' + index,
                        seller: String(seller).trim(),
                        am: String(am).trim(),
                        taskName: String(taskName).trim(),
                        priority: 'P2',
                        completed: false,
                        completedAt: null,
                        createdAt: now,
                        note: ''
                    });
                }
            });
            
            saveToStorage();
            updateAMFilter();
            render();
        }
        // Demo Data
        function loadDemoData() {
            const demoData = [
                { '卖家': 'A', 'AM': 'Wenhui', 'task': 'workshop' },
                { '卖家': 'B', 'AM': 'Wenhui', 'task': 'ads training' },
                { '卖家': 'C', 'AM': 'Vivian', 'task': 'policy training' },
                { '卖家': 'D', 'AM': 'Vivian', 'task': 'policy training' },
                { '卖家': 'E', 'AM': 'Wenhui', 'task': 'workshop' },
                { '卖家': 'F', 'AM': 'Vivian', 'task': 'ads training' },
                { '卖家': 'G', 'AM': 'Topher', 'task': 'policy training' },
                { '卖家': 'H', 'AM': 'Topher', 'task': 'workshop' },
            ];
            importTasks(demoData);
        }
        // Update AM Filter Options
        function updateAMFilter() {
          const ams = [...new Set(tasks.map(t => t.am))].sort();
          const select = document.getElementById('am-filter');
          select.innerHTML = '<option value="">全部 AM</option>';
          ams.forEach(am => {
          select.innerHTML += <option value="${am}">${am}</option>;
          });
          }



            // Toggle Task Complete
    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            task.completedAt = task.completed ? Date.now() : null;
            saveToStorage();
            render();
        }
    }
    // Update Priority
    function updatePriority(id, priority) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.priority = priority;
            saveToStorage();
            render();
        }
    }
    // Update Note
    function updateNote(id, note) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.note = note;
            saveToStorage();
        }
    }
    // Switch Tab
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-pending').className = tab === 'pending' ? 'tab-active px-6 py-3 font-medium text-sm flex items-center gap-2' : 'tab-inactive px-6 py-3 font-medium text-sm flex items-center gap-2';
        document.getElementById('tab-completed').className = tab === 'completed' ? 'tab-active px-6 py-3 font-medium text-sm flex items-center gap-2' : 'tab-inactive px-6 py-3 font-medium text-sm flex items-center gap-2';
        render();
    }
    // Render
    function render() {
        updateStats();
        
        // Filter tasks
        let filtered = tasks.filter(t => {
            if (currentAM && t.am !== currentAM) return false;
            if (currentPriority && t.priority !== currentPriority) return false;
            if (searchQuery && !t.seller.toLowerCase().includes(searchQuery) && !t.taskName.toLowerCase().includes(searchQuery)) return false;
            return currentTab === 'pending' ? !t.completed : t.completed;
        });
        const container = document.getElementById('task-container');
        const emptyState = document.getElementById('empty-state');
        if (filtered.length === 0) {
            container.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }
        emptyState.classList.add('hidden');
        // Group by task name for pending, by date for completed
        let html = '';
        if (currentTab === 'pending') {
            // Group by task name
            const grouped = {};
            filtered.forEach(t => {
                const key = `${t.am} - ${t.taskName}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(t);
            });




      Object.entries(grouped).forEach(([key, groupTasks]) => {
      const completedCount = groupTasks.filter(t => t.completed).length;
      const progress = Math.round((completedCount / groupTasks.length) * 100);
      const p0Count = groupTasks.filter(t => t.priority === 'P0').length;

                                      html += `
                    <div class="bg-white rounded-xl shadow-sm p-5 task-card fade-in">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <h3 class="text-lg font-semibold text-gray-900">${key}</h3>
                                ${p0Count > 0 ? `<span class="px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">${p0Count} 紧急</span>` : ''}
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-gray-500">${completedCount}/${groupTasks.length}</span>
                                <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 rounded-full transition-all" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            ${groupTasks.map(t => `
                                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                                    <div class="checkbox-wrapper" onclick="toggleTask('${t.id}')">
                                        <div class="custom-checkbox ${t.completed ? 'checked' : ''}"></div>
                                    </div>
                                    <div class="flex-1">
                                        <div class="font-medium text-gray-900">${t.seller}</div>
                                    </div>
                                    <select onchange="updatePriority('${t.id}', this.value)" class="text-xs px-2 py-1 rounded priority-${t.priority.toLowerCase()} focus:outline-none cursor-pointer">
                                        <option value="P0" ${t.priority === 'P0' ? 'selected' : ''}>P0</option>
                                        <option value="P1" ${t.priority === 'P1' ? 'selected' : ''}>P1</option>
                                        <option value="P2" ${t.priority === 'P2' ? 'selected' : ''}>P2</option>
                                    </select>
                                    <input type="text" value="${t.note}" placeholder="添加备注..." 
                                        onchange="updateNote('${t.id}', this.value)"
                                        class="w-40 px-2 py-1 text-sm border border-gray-200 rounded focus:outline-none focus:border-blue-400">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        } else {
            // Group by completion date
            const grouped = {};
            filtered.forEach(t => {
                const date = new Date(t.completedAt).toLocaleDateString('zh-CN');
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(t);
            });


      Object.entries(grouped).sort((a, b) => new Date(b[0]) - new Date(a[0])).forEach(([date, dateTasks]) => {
html += <div class="bg-white rounded-xl shadow-sm p-5 task-card fade-in"> <div class="flex items-center gap-2 mb-4"> <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center"> <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/> </svg> </div> <h3 class="text-lg font-semibold text-gray-900">${date}</h3> <span class="text-sm text-gray-500">完成 ${dateTasks.length} 项</span> </div> <div class="space-y-2"> ${dateTasks.map(t =>
<div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
<div class="checkbox-wrapper" onclick="toggleTask('${t.id}')">
<div class="custom-checkbox checked"></div>
</div>
<div class="flex-1">
<div class="font-medium text-gray-900 line-through text-gray-500">${t.seller}</div>
<div class="text-sm text-gray-400">${t.am} · ${t.taskName}</div>
</div>
${t.note ? <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">${t.note}</span> : ''}
</div>
).join('')} </div> </div> ;
});
}

     container.innerHTML = html;
    }
    // Update Statistics
    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const pending = total - completed;
        const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('stats-pending').textContent = pending;
        document.getElementById('stats-completed').textContent = `${completed}/${total}`;
        document.getElementById('progress-text').textContent = `${rate}%`;
        document.getElementById('progress-circle').style.strokeDashoffset = 100 - rate;
        
        document.getElementById('badge-pending').textContent = pending;
        document.getElementById('badge-completed').textContent = completed;
    }
    // Export to Excel
    function exportData() {
        if (tasks.length === 0) {
            alert('没有数据可导出');
            return;
        }
        const data = tasks.map(t => ({
            '卖家': t.seller,
            'AM': t.am,
            '任务': t.taskName,
            '优先级': t.priority,
            '完成状态': t.completed ? '已完成' : '待办',
            '完成时间': t.completedAt ? new Date(t.completedAt).toLocaleString('zh-CN') : '-',
            '备注': t.note
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '任务列表');
        XLSX.writeFile(wb, `AM任务列表_${new Date().toLocaleDateString('zh-CN')}.xlsx`);
    }
    // Clear All Data
    function clearAllData() {
        if (confirm('确定要清空所有数据吗？此操作不可恢复。')) {
            tasks = [];
            saveToStorage();
            updateAMFilter();


      render();
}
}
        // Storage
    function saveToStorage() {
        localStorage.setItem('am_tasks', JSON.stringify(tasks));
    }
    function loadFromStorage() {
        const stored = localStorage.getItem('am_tasks');
        if (stored) {
            tasks = JSON.parse(stored);
            updateAMFilter();
        }
    }
</script>

  </body>
  </html>
